# Phase 1 (ALOHA) — 액션청크 <-> Δz 결합 AE (time 표현 기본)
# chunk_repr: dct(FAST식 주파수 표현)는 캠페인에서 aloha 폐루프 +8pp였으나
# 연구 보류 상태 — 코드(src/core/chunkrep.py)는 유지, 기본 미사용. 재개 시 dct로 변경.
data:
  root:
    - ~/clip_ws/data/act_sim/sim_transfer_cube
    - ~/clip_ws/data/act_sim/sim_insertion
  camera: angle                # 정면 3인칭 단일 카메라
  chunk_sec: 0.32              # 50Hz × 16스텝
  n_chunk: 16
  chunk_repr: time             # time(기본) | dct(연구 보류) — 하류 전체가 phase1 ckpt 키를 따름
  val_episodes: 0.2            # 비율(<1) 또는 개수(≥1)
  cache_dir: ~/clip_ws/outputs/cache/act_sim_emb

model:
  latent_dim: 768
  hidden: 512
  layers: 4
  dropout: 0.2
  state_cond: true             # g(a,z_t)/h(Δ,z_t) — 핵심 축

loss:
  align: 0.5                   # g(a)≈Δz (MSE+cos)
  recon: 0.5                   # h(Δ실제)≈a (L1, FLD 대응)
  cycle: 0.25                  # h(g(a))≈a (L1) — phase2 디코딩 경로

train:
  batch_size: 256
  lr: 1.0e-4
  adam_betas: [0.95, 0.999]
  scheduler: cosine
  warmup_steps: 500
  epochs: 50
  early_stop_patience: 20
  seed: 0
  checkpoint: ~/clip_ws/checkpoints/phase1_delta_ae.pt

wandb: {enabled: true, project: clipvp, mode: online, run_name: phase1_aloha}
