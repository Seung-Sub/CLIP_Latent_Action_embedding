# Phase 2 (ALOHA) — ★기본: flow(past) + ctx4, time 표현 (DCT는 연구 보류로 제외)
# 캠페인 참고치(docs/upgrade_report.md): DCT 조합 시 100롤 시드3 평균 58/35.7 (기준 43/28).
# time 표현의 flow+ctx4 실측치는 아래 checkpoint 학습 시 기록. 베이스라인은 phase2_mlp.yaml.
phase1_ckpt: ~/clip_ws/checkpoints/phase1_delta_ae.pt

data:
  root:
    - ~/clip_ws/data/act_sim/sim_transfer_cube
    - ~/clip_ws/data/act_sim/sim_insertion
  camera: angle
  chunk_sec: 0.32
  n_chunk: 16
  stride: 2
  val_episodes: 0.2
  cache_dir: ~/clip_ws/outputs/cache/act_sim_emb

module:
  name: flow                   # ★생성형 헤드 (CFM+FLD) — insertion 강건성 담당
  flow_source: past            # g(A_past)에서 수송 (A2A식) — 일관 승자
  flow_steps: 6
  source_noise: 0.1
  d_model: 1024                # 1536은 무이득 (aloha)
  layers: 4                    # v_net 잔차블록
  ctx_layers: 4                # ★aloha 최적 마무리 손잡이 (기본 2 대비 합산 82→96)

loss:
  lat: 0.5                     # flow에선 CFM 가중
  act: 1.0                     # FLD 디코딩 액션 L1
  wm: 0.0

train:
  batch_size: 256
  lr: 1.0e-4
  adam_betas: [0.95, 0.999]
  scheduler: cosine
  warmup_steps: 500
  epochs: 50
  early_stop_patience: 20
  seed: 1                      # 캠페인 승자 시드 (시드 분산 큼 — 최종 선택은 폐루프로)
  past_noise: 0.05           # 과거청크 노이즈 주입 (폐루프 분포이동 대응)
  checkpoint: ~/clip_ws/checkpoints/phase2_aloha_fm.pt

wandb: {enabled: true, project: clipvp, mode: online, run_name: phase2_aloha_fm}
