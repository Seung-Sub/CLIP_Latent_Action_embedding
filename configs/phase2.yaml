# Phase 2 — 잠재 정책 f (그리드 46런 확정 레시피: MAE 0.44±0.03°)
phase1_ckpt: ~/clip_ws/checkpoints/phase1_delta_ae.pt

data:
  root:
    - ~/clip_ws/data/act_sim/sim_transfer_cube
    - ~/clip_ws/data/act_sim/sim_insertion
  camera: angle
  chunk_sec: 0.32
  n_chunk: 16
  stride: 2
  val_episodes: 0.2            # 비율(<1) 또는 개수(≥1)
  cache_dir: ~/clip_ws/outputs/cache/act_sim_emb

module:
  name: mlp                    # 그리드 승자 (> cls > pma)
  d_model: 1024                # 폭은 크게, 깊이는 4가 최적
  layers: 4
  heads: 8                     # mlp에선 미사용

loss:
  lat: 0.5                     # 잠재 GT g(A_fut,z_t) — 보조 (latcos 0.965 확보)
  act: 1.0                     # 디코딩 액션 L1 — 주 (S1 절제 결론)
  wm: 0.0                      # Δz_fut 보조항 기각

train:
  batch_size: 256
  lr: 1.0e-4
  adam_betas: [0.95, 0.999]
  scheduler: cosine
  warmup_steps: 500
  epochs: 50
  early_stop_patience: 20
  seed: 0
  past_noise: 0.05           # 과거청크 노이즈 주입 (폐루프 분포이동 대응)
  checkpoint: ~/clip_ws/checkpoints/phase2_policy.pt

wandb: {enabled: true, project: clipvp, mode: online, run_name: phase2}
